schema_version: 1
skill:
  name: demo
  description: |
    Exemple minimal awok : un pipeline collecte → résumé. Montre les phases,
    les dépendances, et les I/O par rôle résolus via la carte `namespaces`.
  title: "/demo — exemple awok"
namespaces:
  work: work/demo
groups:
  collect:
    description: Collecte des sources
    risk: none
  publish:
    description: Production du livrable
    risk: none
phases:
  - id: D0-COLLECT
    name: Collecte
    group: collect
    type: agent
    invocations:
      - agent: collector
        model: haiku
        description: Récupère les sources
        outputs:
          - { role: work:notes, kind: md }
  - id: D1-SUMMARIZE
    name: Résumé
    group: publish
    type: agent
    depends_on:
      - D0-COLLECT
    invocations:
      - agent: summarizer
        model: sonnet
        description: Produit le digest
        inputs:
          - { role: work:notes, kind: md }
        outputs:
          - { role: work:digest, kind: md, terminal: true }
