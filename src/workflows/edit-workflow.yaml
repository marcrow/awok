schema_version: 1
skill:
  name: edit-workflow
  description: |
    Safely modify an EXISTING awok workflow — from a raw change idea (a new feature,
    or a fix for a defect met in use) to a validated, regenerated, non-regressing
    implementation. awok's mechanics and the target workflow are loaded up front; a
    cheap, parallel value gate challenges whether the change is even worth doing
    (early-exit) before an impact pass predicts its blast-radius; then implement, regenerate,
    sync the human docs, and hand off to /workflow-doctor. Domain-agnostic — the target
    workflow may be about anything. Use it to change an awok workflow instead of an
    ad-hoc /brainstorm → /write-plan → /execute-plan pass that is blind to awok's seams.
  title: "/edit-workflow — safely evolve an existing awok workflow"
namespaces:
  work: work/edit-workflow
opportunistic:
  enabled: true
  when: >
    In the value gate, when a change's worth is empirically questionable and no planned
    probe settles it; or in the impact pass, when a risk category surfaces that the
    planned risk analysis does not cover.
  examples:
    - "change's value is unclear → author an ad-hoc research/probe agent to settle it cheaply"
    - "an unforeseen risk class appears → spin up a targeted check before deciding"
groups:
  frame:
    description: Load awok's mechanics and the target workflow, capture the change
    risk: none
  decide:
    description: Gate the change on value first, then predict its impact
    risk: low
  build:
    description: Implement the change and regenerate the artifacts
    risk: medium
  ship:
    description: Sync the human docs and hand off to the doctor
    risk: low
phases:
  - id: S1-FRAME
    name: Load the target + capture the change
    group: frame
    type: main_agent
    interactive: true
    description: >
      Load awok's mechanics LIVE so nothing drifts: read src/workflow/workflow.schema.json
      (the authoritative shape of a workflow — phase types, io_ref, invocation fields) and
      the relevant parts of CLAUDE.md + docs/dev/bb-workflow.md, rather than trusting any
      pre-baked prose. Then read the TARGET workflow directly — its src/workflows/<target>.yaml,
      its generated SKILL.md, and the agent files it references — so you (the orchestrator)
      carry its full context into the gates yourself (a sub-agent summary would be lossy).
      Capture the maintainer's RAW change request (the problem or idea, in their words) —
      deliberately NOT yet a locked spec with acceptance criteria, so the value gate has a
      live idea to challenge. Write the target workflow's name to target-name for the
      generate step.
    inputs:
      - { path: "src/workflow/workflow.schema.json", kind: json, external: true }
      - { path: "src/workflows/", kind: dir, external: true }
      - { path: "src/agents/", kind: dir, external: true }
    outputs:
      - { role: work:change-request, kind: md }
      - { role: work:target-name, kind: text }
  - id: S2-WORTH
    name: Gate 1 — worth probe
    group: decide
    type: agent
    depends_on: [S1-FRAME]
    parallel_with: [S2-DEVIL, S2-PREMORTEM]
    invocations:
      - agent: worth-verifier
        model: sonnet
        description: Propose the cheapest empirical way to settle whether the change is worth doing
        inputs:
          - { role: work:change-request, kind: md }
        outputs:
          - { role: work:value-probe, kind: md }
  - id: S2-DEVIL
    name: Gate 1 — devil's advocate
    group: decide
    type: agent
    depends_on: [S1-FRAME]
    parallel_with: [S2-WORTH, S2-PREMORTEM]
    invocations:
      - agent: devils-advocate
        model: sonnet
        description: Steelman then attack the change; trust only the artifact, not the framing
        inputs:
          - { role: work:change-request, kind: md }
        outputs:
          - { role: work:panel-devil, kind: md }
  - id: S2-PREMORTEM
    name: Gate 1 — pre-mortem
    group: decide
    type: agent
    depends_on: [S1-FRAME]
    parallel_with: [S2-WORTH, S2-DEVIL]
    invocations:
      - agent: premortem
        model: sonnet
        description: Assume the change shipped and broke the workflow; trace the specific causes
        inputs:
          - { role: work:change-request, kind: md }
        outputs:
          - { role: work:panel-premortem, kind: md }
  - id: S2-VOTE
    name: Gate 1 — converge on the verdict
    group: decide
    type: main_agent
    interactive: true
    depends_on: [S2-WORTH, S2-DEVIL, S2-PREMORTEM]
    description: >
      The three value probes (worth / devil / pre-mortem) ran in parallel — weave them back to
      the maintainer ONE at a time, stopping after each; never stack them. Force the maintainer
      to weigh alternatives — do-nothing / smaller-scope / different-approach — then converge on
      a verdict: ABANDON, REFORMULATE (loop back to the S2 probes), or PROCEED. Only on PROCEED,
      firm the raw request into a written change-intent (what / why / acceptance criteria). Never
      advance on their behalf.
    inputs:
      - { role: work:change-request, kind: md }
      - { role: work:value-probe, kind: md }
      - { role: work:panel-devil, kind: md }
      - { role: work:panel-premortem, kind: md }
    outputs:
      - { role: work:change-intent, kind: md }
  - id: S3-IMPACT
    name: Gate 2 — predict the blast-radius
    group: decide
    type: main_agent
    interactive: true
    depends_on: [S2-VOTE]
    description: >
      Runs only after S2-VOTE returns PROCEED. Launch risk-cartographer to PREDICT the change's
      blast-radius from the change-intent + the target workflow: which I/O roles and
      producer→consumer seams it touches, and the risk CATEGORIES it opens (cost/tokens,
      cadence mismatch, regression on a downstream seam, redundancy with an existing phase,
      idempotency breakage, model/effort mismatch, and any class the maintainer did not
      enumerate). This is prediction, not measurement — the deterministic structural checks
      fire later where they can actually see the change: awok validate's dataflow warning in
      S5 (an output nobody consumes) and /workflow-doctor's seam audit in S7. Aggregate the
      prediction with the maintainer and decide: proceed to implement, revise the intent, or
      STOP if the impact is prohibitive. Present findings, then STOP for the maintainer.
    inputs:
      - { role: work:change-intent, kind: md }
    outputs:
      - { role: work:impact-report, kind: md }
  - id: S4-IMPLEMENT
    name: Implement the change
    group: build
    type: main_agent
    depends_on: [S3-IMPACT]
    description: >
      Make the maintainer's design concrete. Edit the target src/workflows/<target>.yaml, any
      new or changed src/agents/<agent>.md files, and their invocation snippets in
      src/workflow/templates/invocations/ — following the conventions you loaded in S1 and
      honouring the change-intent + impact-report. You may reuse the scaffold that
      `awok assist "<change>" --workflow <target>` prints as a starting point (but verify it
      against the live schema — its structure summary can lag). If the change touches a SHARED
      agent or an engine/template, flag the ripple (every workflow re-renders) before editing.
      Confirm choices as you go.
    inputs:
      - { role: work:change-intent, kind: md }
      - { role: work:impact-report, kind: md }
    outputs:
      - { path: "src/workflows/", kind: dir, terminal: true, external: true }
  - id: S5-GENERATE
    name: Validate + generate
    group: build
    type: script
    depends_on: [S4-IMPLEMENT]
    description: >
      Validate then regenerate the modified workflow. `awok validate` also emits the dataflow
      warnings — the free, post-implementation structural check (an output no phase consumes =
      the orphan-artifact anti-pattern). The target name is read from the target-name artifact
      written in S1.
    inputs:
      - { role: work:target-name, kind: text }
    cmd: |
      NAME="$(tr -d '[:space:]' < work/edit-workflow/target-name.txt)"
      echo "Validating + generating modified workflow: $NAME"
      awok validate "$NAME"
      awok generate --workflow "$NAME"
  - id: S6-DOCSYNC
    name: Sync the human docs
    group: ship
    type: agent
    depends_on: [S5-GENERATE]
    invocations:
      - agent: docsync-writer
        model: sonnet
        description: Update the human-maintained docs that the change actually touches, proportionally
        inputs:
          - { role: work:change-intent, kind: md }
          - { role: work:impact-report, kind: md }
        outputs:
          - { role: work:docsync-report, kind: md }
  - id: S7-VERIFY
    name: Verify with the doctor
    group: ship
    type: workflow_call
    workflow: workflow-doctor
    depends_on: [S6-DOCSYNC]
    description: >
      Dispatch /workflow-doctor on the modified target workflow. This is the real,
      post-generation seam / agent-fitness / prose↔declared-drift audit — it runs here (not in
      S3) because only now does the regenerated SKILL.md reflect the change. Tell the doctor
      which workflow to audit (the target name).
  - id: S8-HANDOFF
    name: Hand off
    group: ship
    type: main_agent
    depends_on: [S7-VERIFY]
    description: >
      Read the doctor's verdict. If it surfaces a defect introduced by the change, loop back to
      S4 with the fix list. Otherwise hand off: summarize what changed (YAML, agents, docs),
      offer to run ./install.sh and smoke-test the modified /skill, and note whether any ripple
      (shared agent / engine change) still needs the maintainer's attention.
    inputs:
      - { role: work:impact-report, kind: md }
      - { role: work:docsync-report, kind: md }
on_demand_agents:
  - agent: risk-cartographer
    model: sonnet
    description: |
      Blast-radius predictor for a proposed workflow change. From the change-intent + the target
      workflow, maps the I/O roles and producer→consumer seams it touches and surfaces the risk
      CATEGORIES it opens — generatively, not against a fixed checklist.
    triggered_by: [S3-IMPACT]
    when: In the impact gate (S3), to predict what the change touches and what could go wrong.
