<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>bb-workflow editor</title>
<style>/*__EDITOR_CSS__*/</style>
</head>
<body>
  <header id="topbar">
    <select id="wf-select"></select>
    <button id="wf-new">+ new</button>
    <button id="wf-clone">duplicate</button>
    <button id="add-phase">+ phase</button>
    <button id="add-agent">+ agent</button>
    <button id="wf-save">💾 save</button>
    <span id="status"></span>
  </header>
  <nav id="tabs">
    <button class="tab active" data-tab="grid">Grid</button>
    <button class="tab" data-tab="dataflow">Dataflow</button>
    <button class="tab" data-tab="settings">Settings</button>
    <button class="tab" data-tab="yaml">YAML</button>
  </nav>
  <main>
    <section id="panel-grid" class="panel active">
      <div id="grid-wrap">
        <svg id="edge-overlay"></svg>
        <div id="grid"></div>
      </div>
    </section>
    <section id="panel-dataflow" class="panel"><div id="dataflow-render" class="mermaid-out">(open this tab to load the diagram)</div></section>
    <section id="panel-settings" class="panel"><div id="settings"></div></section>
    <section id="panel-yaml" class="panel"><pre id="yaml-src"></pre></section>
  </main>
  <aside id="edit-panel" hidden></aside>
<script type="module" src="/editor/editor.js"></script>
</body>
</html>
